# dudect-style timing-tool dependency policy.
#
# The published base64-ng crate remains zero-dependency. This isolated package
# depends only on the local base64-ng crate and exists to collect empirical
# timing evidence for constant-time-oriented APIs.

[graph]
all-features = true

[licenses]
confidence-threshold = 0.95
include-dev = true
include-build = true
unused-allowed-license = "allow"
unused-license-exception = "deny"

allow = [
    "Apache-2.0",
    "MIT",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"

[advisories]
db-path = "/tmp/base64-ng-dudect-cargo-deny-advisory-dbs"
yanked = "deny"
unmaintained = "workspace"
unsound = "workspace"
unused-ignored-advisory = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
